name: MacOS-Remote-Tailscale
on: workflow_dispatch

jobs:
  secure-vnc:
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      - name: Force Enable Screen Sharing
        run: |
          # 1. Enable the service using the launchctl-managed background agent
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # 2. Use kickstart to configure permissions and set the password
          # We use a simple password "Runner123!" for the initial VNC handshake
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -allowAccessFor -allUsers -privs -all \
            -clientopts -setvncpassword -vncpasswd "Runner123!" \
            -restart -agent

      - name: Create Remote User
        run: |
          USER_NAME="admin"
          USER_PASS="MacOS@Secure123"
          sudo sysadminctl -addUser $USER_NAME -fullName "Remote Admin" -password "$USER_PASS" -admin
          echo "::add-mask::$USER_PASS"
          echo "VNC_USER=$USER_NAME" >> $GITHUB_ENV
          echo "VNC_PASS=$USER_PASS" >> $GITHUB_ENV

      - name: Install and Start Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          brew install tailscale
          sudo tailscaled install-system-daemon
          sudo tailscale up --authkey=$TS_AUTHKEY --hostname=gh-mac-$GITHUB_RUN_ID
          sleep 5
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Verify Connection & Keep Alive
        run: |
          echo "--- ACCESS DETAILS ---"
          echo "Tailscale IP: $TAILSCALE_IP"
          echo "Username: $VNC_USER"
          echo "Password: $VNC_PASS"
          echo "VNC URL: vnc://$TAILSCALE_IP"
          echo "-----------------------"
          
          # Attempt to check the port 3 times before failing
          for i in {1..5}; do
            if nc -zv localhost 5900; then
              echo "SUCCESS: VNC Port 5900 is open and listening!"
              break
            else
              echo "Attempt $i: VNC port not ready yet... retrying in 5s"
              sleep 5
            fi
            if [ $i -eq 5 ]; then
              echo "ERROR: VNC failed to start after 5 attempts."
              exit 1
            fi
          done

          while true; do
            echo "[$(date)] macOS Runner Active..."
            sleep 300
          done
