name: MacOS-Remote
on: workflow_dispatch

jobs:
  secure-vnc:
    runs-on: macos-latest
    steps:
      - name: Configure macOS Screen Sharing
        run: |
          # Enable Screen Sharing (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -allowAccessFor -allUsers -privs -all \
            -clientopts -setvncpassword -vncpasswd "Runner123!" \
            -restart -agent -menu

      - name: Create Remote User
        run: |
          # Create a user named 'remoteuser' with admin rights
          # Note: In a real scenario, use a secret for the password.
          USER_PASS="MacOS@Secure123"
          sudo sysadminctl -addUser remoteuser -fullName "Remote User" -password "$USER_PASS" -admin
          
          # Mask password in logs
          echo "::add-mask::$USER_PASS"
          echo "VNC_USER=remoteuser" >> $GITHUB_ENV
          echo "VNC_PASS=$USER_PASS" >> $GITHUB_ENV

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          # Path to tailscale on macOS after install is usually /Applications/Tailscale.app/Contents/MacOS/Tailscale
          # However, the shell script usually adds it to path.

      - name: Establish Tailscale Connection
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          sudo tailscale up --authkey=$TS_AUTHKEY --hostname=gh-mac-$GITHUB_RUN_ID
          
          # Wait for IP
          sleep 5
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Maintain Connection
        run: |
          echo "=== macOS VNC ACCESS ==="
          echo "Address: $TAILSCALE_IP"
          echo "Username: $VNC_USER"
          echo "Password: $VNC_PASS"
          echo "VNC Protocol: vnc://$TAILSCALE_IP"
          echo "========================"
          
          # Loop to keep the runner alive
          while true; do
            echo "[$(date)] macOS Runner Active..."
            sleep 300
          done
