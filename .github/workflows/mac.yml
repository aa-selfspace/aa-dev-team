name: MacOS-Remote-Final
on: workflow_dispatch

jobs:
  secure-vnc:
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      - name: Wait for Desktop Environment
        run: |
          # Ensure the GUI login window is ready before configuring VNC
          echo "Waiting for macOS GUI to initialize..."
          until pgrep -x "loginwindow" > /dev/null; do
            sleep 2
          done
          echo "GUI Ready."

      - name: Configure Screen Sharing & Permissions
        run: |
          # 1. Enable Screen Sharing service
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # 2. Use kickstart to set the VNC password and allow access
          # Handshake password: RunnerPassword!
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -allowAccessFor -allUsers -privs -all \
            -clientopts -setvncpassword -vncpasswd "RunnerPassword!" \
            -restart -agent -menu

      - name: Create Admin User
        run: |
          # Credentials for the macOS Login Screen
          USER_NAME="admin"
          USER_PASS="MacOS@Secure123"
          
          sudo sysadminctl -addUser $USER_NAME -fullName "Remote Admin" -password "$USER_PASS" -admin
          
          # Hide password from logs
          echo "::add-mask::$USER_PASS"
          echo "VNC_USER=$USER_NAME" >> $GITHUB_ENV
          echo "VNC_PASS=$USER_PASS" >> $GITHUB_ENV

      - name: Install Tailscale via Homebrew
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Homebrew is more reliable for PATH management on macOS runners
          brew install tailscale
          sudo tailscaled install-system-daemon
          sudo tailscale up --authkey=$TS_AUTHKEY --hostname=gh-mac-$GITHUB_RUN_ID
          
          sleep 5
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Connectivity Check & Output
        run: |
          echo "=========================================="
          echo "ACCESS GRANTED"
          echo "Tailscale IP: $TAILSCALE_IP"
          echo "VNC Handshake Pass: RunnerPassword!"
          echo "macOS User: $VNC_USER"
          echo "macOS Pass: $VNC_PASS"
          echo "URL: vnc://$TAILSCALE_IP"
          echo "=========================================="
          
          # Final verification: check if port 5900 is listening
          for i in {1..10}; do
            if nc -zv localhost 5900; then
              echo "VNC Server is ONLINE."
              exit 0
            fi
            echo "Waiting for VNC server (attempt $i)..."
            sleep 5
          done
          echo "VNC failed to start."
          exit 1

      - name: Keep Runner Alive
        run: |
          # Prevents the job from ending
          while true; do
            echo "[$(date)] Mac is running. Use Ctrl+C in GitHub to stop."
            sleep 300
          done
